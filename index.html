<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Just For Us</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@400;600&display=swap');
        
        :root {
            --timmy-blue: #0A84FF;
            --timmy-glow: rgba(10, 132, 255, 0.4);
            --favour-rose: #FF375F;
            --favour-glow: rgba(255, 55, 95, 0.4);
            --bg-dark: #000000;
            --surface: rgba(28, 28, 30, 0.8);
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: white;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        /* Cinematic Background */
        .cinematic-bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 80%, var(--timmy-glow) 0%, transparent 50%),
                radial-gradient(ellipse 80% 50% at 80% 20%, var(--favour-glow) 0%, transparent 50%),
                var(--bg-dark);
            z-index: -2;
        }
        
        .grain {
            position: fixed;
            inset: 0;
            opacity: 0.03;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        
        /* SVG Icons */
        .icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        
        .icon-lg { width: 32px; height: 32px; }
        .icon-xl { width: 48px; height: 48px; }
        
        /* Auth Screen */
        #authScreen {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        
        .logo-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 32px;
        }
        
        .logo-ring-outer {
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-radius: 50%;
            background: linear-gradient(var(--bg-dark), var(--bg-dark)) padding-box,
                        conic-gradient(from 0deg, var(--timmy-blue), var(--favour-rose), var(--timmy-blue)) border-box;
            animation: spin 8s linear infinite;
        }
        
        .logo-ring-inner {
            position: absolute;
            inset: 8px;
            border: 1px solid var(--border);
            border-radius: 50%;
            animation: spin 12s linear infinite reverse;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .logo-core {
            position: absolute;
            inset: 20px;
            background: linear-gradient(135deg, rgba(10,132,255,0.3), rgba(255,55,95,0.3));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        
        .brand-title {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        
        .brand-tagline {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 8px;
        }
        
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            margin-top: 40px;
        }
        
        .user-selector {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
        }
        
        .user-card {
            flex: 1;
            padding: 24px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }
        
        .user-card:hover { transform: translateY(-2px); }
        
        .user-card.timmy.selected {
            background: rgba(10,132,255,0.15);
            border-color: var(--timmy-blue);
            box-shadow: 0 0 30px var(--timmy-glow);
        }
        
        .user-card.favour.selected {
            background: rgba(255,55,95,0.15);
            border-color: var(--favour-rose);
            box-shadow: 0 0 30px var(--favour-glow);
        }
        
        .user-avatar-svg {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .timmy .user-avatar-svg { background: rgba(10,132,255,0.2); color: var(--timmy-blue); }
        .favour .user-avatar-svg { background: rgba(255,55,95,0.2); color: var(--favour-rose); }
        
        .user-label {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .month-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 16px;
        }
        
        .month-btn {
            aspect-ratio: 1;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .month-btn:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }
        
        .month-btn.correct {
            background: var(--timmy-blue);
            color: white;
            border-color: transparent;
        }
        
        .month-btn.correct.favour {
            background: var(--favour-rose);
        }
        
        .enter-btn {
            width: 100%;
            margin-top: 24px;
            padding: 18px;
            border-radius: 14px;
            border: none;
            background: var(--timmy-blue);
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .enter-btn.visible { opacity: 1; transform: translateY(0); }
        .enter-btn.favour { background: var(--favour-rose); }
        
        /* Chat Interface */
        #chatScreen {
            display: none;
            height: 100%;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        
        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header-info {
            flex: 1;
            text-align: center;
        }
        
        .partner-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,55,95,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 4px;
            color: var(--favour-rose);
        }
        
        .partner-name {
            font-size: 15px;
            font-weight: 600;
        }
        
        .partner-status {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: #30D158;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .typing-dots {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        
        .typing-dots span {
            width: 4px;
            height: 4px;
            background: var(--favour-rose);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        
        .header-action {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.4;
            animation: messageIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .message.timmy {
            align-self: flex-end;
            background: var(--timmy-blue);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.favour {
            align-self: flex-start;
            background: var(--favour-rose);
            color: white;
            border-bottom-left-radius: 4px;
        }
        
        .message.system {
            align-self: center;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            padding: 8px 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .message-meta {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }
        
        .read-status {
            font-size: 12px;
        }
        
        .message-media {
            max-width: 200px;
            border-radius: 12px;
            margin-bottom: 4px;
        }
        
        /* Input Area */
        .input-section {
            padding: 12px 16px 24px;
            background: rgba(0,0,0,0.95);
            border-top: 1px solid var(--border);
        }
        
        .quick-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .quick-actions::-webkit-scrollbar { display: none; }
        
        .action-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .action-chip:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }
        
        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }
        
        .input-field {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
        }
        
        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            padding: 6px 0;
        }
        
        #messageInput::placeholder { color: rgba(255,255,255,0.4); }
        
        .input-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--timmy-blue);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        
        .send-button:active { transform: scale(0.95); }
        
        /* Floating Action */
        .fab-miss {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--favour-rose), #FF6B9D);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 24px var(--favour-glow);
            animation: heartbeat 2s ease-in-out infinite;
            z-index: 100;
            display: none;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 24px var(--favour-glow); }
            50% { transform: scale(1.08); box-shadow: 0 6px 32px var(--favour-glow); }
        }
        
        /* Game Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            align-items: flex-end;
        }
        
        .modal-sheet {
            width: 100%;
            background: var(--surface);
            border-radius: 32px 32px 0 0;
            padding: 24px;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid var(--border);
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .modal-handle {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 0 auto 24px;
        }
        
        .game-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .game-tile {
            aspect-ratio: 1;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .game-tile:hover { transform: translateY(-4px); background: rgba(255,255,255,0.06); }
        
        .game-icon-bg {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .game-tile.tictactoe .game-icon-bg { background: linear-gradient(135deg, #30D158, #28CD41); }
        .game-tile.paintball .game-icon-bg { background: linear-gradient(135deg, #FF9500, #FF6B00); }
        .game-tile.cuppong .game-icon-bg { background: linear-gradient(135deg, #AF52DE, #8944AB); }
        
        .game-label {
            font-size: 15px;
            font-weight: 600;
        }
        
        .game-status {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        
        .cancel-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Tic-Tac-Toe Game Board */
        .game-board {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 2000;
            flex-direction: column;
        }
        
        .game-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        
        .game-title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .score-board {
            display: flex;
            gap: 24px;
            font-size: 14px;
        }
        
        .score { text-align: center; }
        .score-value { font-size: 24px; font-weight: 700; }
        .score-label { color: rgba(255,255,255,0.5); font-size: 12px; }
        
        .tictactoe-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 40px;
            max-width: 400px;
            margin: 0 auto;
            align-content: center;
        }
        
        .tictactoe-cell {
            aspect-ratio: 1;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tictactoe-cell:hover:not(.taken) { background: rgba(255,255,255,0.12); }
        .tictactoe-cell.taken { cursor: default; }
        
        .tictactoe-cell.x { color: var(--timmy-blue); }
        .tictactoe-cell.o { color: var(--favour-rose); }
        
        .game-status-bar {
            padding: 20px;
            text-align: center;
            font-size: 16px;
            color: rgba(255,255,255,0.7);
        }
        
        .turn-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Poke Overlay */
        .poke-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: shake 0.6s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-30px) rotate(-5deg); }
            40% { transform: translateX(30px) rotate(5deg); }
            60% { transform: translateX(-20px) rotate(-3deg); }
            80% { transform: translateX(20px) rotate(3deg); }
        }
        
        .poke-hand {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--timmy-blue), #5856D6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pokePulse 0.5s infinite;
            box-shadow: 0 0 60px var(--timmy-glow);
        }
        
        @keyframes pokePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .poke-text {
            margin-top: 32px;
            font-size: 28px;
            font-weight: 700;
        }
        
        /* Call Screen */
        .call-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 2500;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .call-avatar-large {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,55,95,0.2), rgba(255,55,95,0.05));
            border: 2px solid rgba(255,55,95,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            animation: callPulse 2s infinite;
        }
        
        @keyframes callPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        .call-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .call-timer {
            font-size: 16px;
            color: rgba(255,255,255,0.5);
            font-variant-numeric: tabular-nums;
        }
        
        .call-controls {
            position: absolute;
            bottom: 60px;
            display: flex;
            gap: 32px;
        }
        
        .call-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: white;
            cursor: pointer;
        }
        
        .call-btn.mute { background: rgba(255,255,255,0.2); }
        .call-btn.end { background: #FF3B30; }
        
        .call-btn span:last-child {
            font-size: 11px;
            font-weight: 500;
        }
        
        #fileInput, #cameraInput { display: none; }
    </style>
</head>
<body>
    <div class="cinematic-bg"></div>
    <div class="grain"></div>
    
    <!-- SVG Definitions -->
    <svg style="display: none;">
        <defs>
            <!-- User Icon -->
            <symbol id="icon-user" viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M4 20c0-4 4-6 8-6s8 2 8 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </symbol>
            <!-- Send Icon -->
            <symbol id="icon-send" viewBox="0 0 24 24">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </symbol>
            <!-- Phone Icon -->
            <symbol id="icon-phone" viewBox="0 0 24 24">

    <script>
        // ==================== FIREBASE CONFIG - PASTE YOURS HERE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBiOpxyyEcF4H9e3naEOycfixZUETkiL-c",
  authDomain: "just-for-us-chat.firebaseapp.com",
  projectId: "just-for-us-chat",
  storageBucket: "just-for-us-chat.firebasestorage.app",
  messagingSenderId: "956164356831",
  appId: "1:956164356831:web:5e05d2cb5673c33d47076a",
  measurementId: "G-P43TXFHV85"
        };

        // Initialize Firebase
        let db = null;
        let chatRef = null;
        let gameRef = null;
        
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            console.log("Firebase ready");
        } catch (e) {
            console.log("Firebase not configured");
        }

        // ==================== APP STATE ====================
        const USERS = {
            Timmy: { gender: 'timmy', month: 3, symbol: 'X', color: '#0A84FF' },
            Favour: { gender: 'favour', month: 8, symbol: 'O', color: '#FF375F' }
        };

        const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        
        let currentUser = null;
        let partnerUser = null;
        let chatRoomId = 'timmy_favour_private';
        
        // Tic-Tac-Toe State
        let tttBoard = ['', '', '', '', '', '', '', '', ''];
        let tttCurrentPlayer = 'X';
        let tttScores = { X: 0, O: 0 };
        let tttGameActive = true;

        // ==================== AUTH ====================
        function selectUser(name) {
            currentUser = name;
            partnerUser = name === 'Timmy' ? 'Favour' : 'Timmy';
            
            document.querySelectorAll('.user-card').forEach(el => {
                el.classList.remove('selected', 'female-selected');
            });
            
            const selectedEl = document.querySelector(`.user-card.${name.toLowerCase()}`);
            selectedEl.classList.add('selected');
            if (name === 'Favour') selectedEl.classList.add('female-selected');
            
            document.getElementById('birthdaySection').style.display = 'block';
            renderMonths();
        }

        function renderMonths() {
            const grid = document.getElementById('monthGrid');
            grid.innerHTML = '';
            
            MONTHS.forEach((month, idx) => {
                const btn = document.createElement('button');
                btn.className = 'month-btn';
                if (USERS[currentUser].gender === 'favour') btn.classList.add('correct', 'favour');
                btn.textContent = month;
                btn.onclick = () => checkMonth(idx, btn);
                grid.appendChild(btn);
            });
        }

        function checkMonth(idx, btn) {
            document.querySelectorAll('.month-btn').forEach(b => {
                b.classList.remove('correct');
                if (USERS[currentUser].gender === 'favour') b.classList.remove('favour');
            });
            
            if (idx === USERS[currentUser].month) {
                btn.classList.add('correct');
                if (USERS[currentUser].gender === 'favour') btn.classList.add('favour');
                
                const enterBtn = document.getElementById('enterBtn');
                enterBtn.classList.add('visible');
                if (USERS[currentUser].gender === 'favour') enterBtn.classList.add('favour');
            }
        }

        function enterChat() {
            if (!db) {
                alert('Please paste your Firebase config first! (Line 595)');
                return;
            }

            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('missYouBtn').style.display = 'flex';
            document.getElementById('partnerName').textContent = partnerUser;
            
            setupChat();
            setupPresence();
            setupTyping();
            
            // Request notifications
            if ('Notification' in window) Notification.requestPermission();
        }

        // ==================== CHAT ====================
        function setupChat() {
            chatRef = db.ref(`chats/${chatRoomId}/messages`);
            
            chatRef.limitToLast(50).on('child_added', (snapshot) => {
                const msg = snapshot.val();
                displayMessage(msg);
            });
        }

        function displayMessage(msg) {
            const isMe = msg.sender === currentUser;
            const container = document.getElementById('messagesArea');
            
            // Check for duplicate
            if (document.getElementById(`msg-${msg.id}`)) return;
            
            const div = document.createElement('div');
            div.id = `msg-${msg.id}`;
            div.className = `message ${isMe ? USERS[currentUser].gender : USERS[partnerUser].gender}`;
            
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const read = msg.read ? '✓✓' : '✓';
            
            if (msg.type === 'image') {
                div.innerHTML = `<img src="${msg.content}" class="message-media" onclick="window.open('${msg.content}')"><div class="message-meta">${time} ${isMe ? read : ''}</div>`;
            } else {
                div.innerHTML = `<div>${escapeHtml(msg.content)}</div><div class="message-meta">${time} ${isMe ? read : ''}</div>`;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            if (!isMe && !msg.read) {
                chatRef.child(msg.id).update({ read: true });
            }
        }

        function sendMessage() {
            if (!db) { alert('Firebase not connected'); return; }
            
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const msg = {
                id: Date.now().toString(),
                sender: currentUser,
                content: text,
                type: 'text',
                timestamp: Date.now(),
                read: false
            };
            
            chatRef.child(msg.id).set(msg);
            input.value = '';
            
            db.ref(`chats/${chatRoomId}/typing/${currentUser}`).remove();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
                return;
            }
            
            if (db) {
                db.ref(`chats/${chatRoomId}/typing/${currentUser}`).set(Date.now());
                setTimeout(() => {
                    db.ref(`chats/${chatRoomId}/typing/${currentUser}`).remove();
                }, 3000);
            }
        }

        function setupTyping() {
            if (!db) return;
            
            db.ref(`chats/${chatRoomId}/typing`).on('value', (snap) => {
                const typing = snap.val();
                if (typing && typing[partnerUser]) {
                    document.getElementById('partnerStatus').innerHTML = `
                        <div class="typing-dots"><span></span><span></span><span></span></div>
                        <span style="margin-left: 6px;">typing</span>
                    `;
                } else {
                    document.getElementById('partnerStatus').innerHTML = `<span class="status-dot"></span><span>Online</span>`;
                }
            });
        }

        function setupPresence() {
            if (!db) return;
            
            const myStatus = db.ref(`chats/${chatRoomId}/presence/${currentUser}`);
            myStatus.set(true);
            myStatus.onDisconnect().remove();
        }

        function handleFile(input) {
            if (!input.files || !input.files[0]) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const msg = {
                    id: Date.now().toString(),
                    sender: currentUser,
                    content: e.target.result,
                    type: 'image',
                    timestamp: Date.now(),
                    read: false
                };
                chatRef.child(msg.id).set(msg);
            };
            reader.readAsDataURL(input.files[0]);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== FEATURES ====================
        function openGameModal() {
            document.getElementById('gameModal').style.display = 'flex';
        }

        function closeGameModal(e) {
            if (!e || e.target.id === 'gameModal') {
                document.getElementById('gameModal').style.display = 'none';
            }
        }

        function comingSoon(game) {
            alert(`${game} coming in next update!`);
        }

        function pokePartner() {
            if (!db) return;
            
            db.ref(`chats/${chatRoomId}/pokes`).push({
                from: currentUser,
                to: partnerUser,
                timestamp: Date.now()
            });
            
            document.getElementById('pokeText').textContent = `You poked ${partnerUser}`;
            document.getElementById('pokeScreen').style.display = 'flex';
            setTimeout(() => document.getElementById('pokeScreen').style.display = 'none', 2000);
            
            if (navigator.vibrate) navigator.vibrate([50, 100, 50, 100, 200]);
        }

        // Listen for pokes
        if (db) {
            db.ref(`chats/${chatRoomId}/pokes`).orderByChild('timestamp').startAt(Date.now()).on('child_added', (snap) => {
                const poke = snap.val();
                if (poke.to === currentUser) {
                    document.getElementById('pokeText').textContent = `${poke.from} poked you!`;
                    document.getElementById('pokeScreen').style.display = 'flex';
                    if (navigator.vibrate) navigator.vibrate([50, 100, 50, 100, 200]);
                    setTimeout(() => document.getElementById('pokeScreen').style.display = 'none', 2000);
                }
            });
        }

        function sendMissYou() {
            if (!db) return;
            
            const msg = {
                id: Date.now().toString(),
                sender: currentUser,
                content: "I miss you so much it hurts 💔",
                type: 'text',
                timestamp: Date.now(),
                read: false
            };
            chatRef.child(msg.id).set(msg);
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300, 100, 300]);
        }

        function startCall() {
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('callName').textContent = partnerUser;
            
            setTimeout(() => {
                document.getElementById('callTimer').textContent = '00:00';
                let seconds = 0;
                window.callInterval = setInterval(() => {
                    seconds++;
                    const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                    const secs = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('callTimer').textContent = `${mins}:${secs}`;
                }, 1000);
            }, 2000);
        }

        function endCall() {
            clearInterval(window.callInterval);
            document.getElementById('callScreen').style.display = 'none';
        }

        // ==================== TIC-TAC-TOE ====================
        function startTicTacToe() {
            closeGameModal();
            document.getElementById('tictactoeBoard').style.display = 'flex';
            initTicTacToe();
            
            // Setup Firebase sync
            if (db) {
                gameRef = db.ref(`chats/${chatRoomId}/tictactoe`);
                gameRef.on('value', (snap) => {
                    const data = snap.val();
                    if (data) syncTicTacToe(data);
                });
            }
        }

        function closeTicTacToe() {
            document.getElementById('tictactoeBoard').style.display = 'none';
            if (gameRef) gameRef.off();
        }

        function initTicTacToe() {
            const grid = document.getElementById('tictactoeGrid');
            grid.innerHTML = '';
            tttBoard = ['', '', '', '', '', '', '', '', ''];
            tttCurrentPlayer = 'X';
            tttGameActive = true;
            updateTurnIndicator();
            
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'tictactoe-cell';
                cell.dataset.index = i;
                cell.onclick = () => makeMove(i);
                grid.appendChild(cell);
            }
        }

        function makeMove(index) {
            if (!tttGameActive || tttBoard[index] !== '') return;
            
            // Check if it's my turn
            const mySymbol = USERS[currentUser].symbol;
            if (tttCurrentPlayer !== mySymbol) {
                alert("Wait for your turn!");
                return;
            }
            
            tttBoard[index] = tttCurrentPlayer;
            updateCell(index, tttCurrentPlayer);
            
            // Sync to Firebase
            if (gameRef) {
                gameRef.set({
                    board: tttBoard,
                    currentPlayer: tttCurrentPlayer === 'X' ? 'O' : 'X',
                    lastMove: index,
                    lastMoveBy: currentUser,
                    timestamp: Date.now()
                });
            }
            
            checkWinner();
        }

        function syncTicTacToe(data) {
            if (!data || !data.board) return;
            
            tttBoard = data.board;
            tttCurrentPlayer = data.currentPlayer;
            
            // Update all cells
            tttBoard.forEach((val, idx) => {
                if (val) updateCell(idx, val);
            });
            
            updateTurnIndicator();
            
            // Check if game just ended
            checkWinner(true);
        }

        function updateCell(index, player) {
            const cell = document.querySelector(`.tictactoe-cell[data-index="${index}"]`);
            if (!cell || cell.classList.contains('taken')) return;
            
            cell.classList.add('taken', player.toLowerCase());
            cell.innerHTML = player === 'X' 
                ? '<svg class="icon icon-xl" style="color: var(--timmy-blue);"><use href="#icon-x"/></svg>'
                : '<svg class="icon icon-xl" style="color: var(--favour-rose);"><use href="#icon-o"/></svg>';
        }

        function updateTurnIndicator() {
            const isMyTurn = tttCurrentPlayer === USERS[currentUser].symbol;
            const playerName = tttCurrentPlayer === 'X' ? 'Timmy' : 'Favour';
            const color = tttCurrentPlayer === 'X' ? 'var(--timmy-blue)' : 'var(--favour-rose)';
            const Icon = tttCurrentPlayer === 'X' ? '#icon-x' : '#icon-o';
            
            document.getElementById('turnIndicator').innerHTML = `
                <span>${isMyTurn ? 'Your turn' : `${playerName}'s turn`}</span>
                <svg class="icon" style="color: ${color};"><use href="${Icon}"/></svg>
            `;
        }

        function checkWinner(fromSync = false) {
            const wins = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
            
            for (const [a, b, c] of wins) {
                if (tttBoard[a] && tttBoard[a] === tttBoard[b] && tttBoard[a] === tttBoard[c]) {
                    tttGameActive = false;
                    const winner = tttBoard[a];
                    tttScores[winner]++;
                    document.getElementById('scoreX').textContent = tttScores.X;
                    document.getElementById('scoreO').textContent = tttScores.O;
                    
                    setTimeout(() => {
                        alert(`${winner === 'X' ? 'Timmy' : 'Favour'} wins!`);
                        initTicTacToe();
                    }, 500);
                    return;
                }
            }
            
            if (!tttBoard.includes('')) {
                tttGameActive = false;
                setTimeout(() => {
                    alert("Draw!");
                    initTicTacToe();
                }, 500);
            }
        }
    </script>
</body>
</html>
